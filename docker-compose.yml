services:
  ai-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ponti_ai
    ports:
      - "5435:5432"
    volumes:
      - ai-db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ponti_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ai-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      ai-db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgresql://postgres:postgres@ai-db:5432/ponti_ai?sslmode=disable", "up"]

  ponti-ai:
    build: .
    depends_on:
      ai-db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - APP_NAME=ponti-ai
      - APP_ENV=local
      - DB_DSN=postgresql://postgres:postgres@ai-db:5432/ponti_ai?sslmode=disable
      - AI_SERVICE_KEYS=servicekey123
      - STATEMENT_TIMEOUT_MS=20000
      - MAX_LIMIT=200
      - DEFAULT_LIMIT=50
      - COPILOT_ENABLED=true
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.1
      - LLM_TIMEOUT_MS=5000
      - LLM_MAX_RETRIES=1
      - LLM_MAX_OUTPUT_TOKENS=700
      - LLM_MAX_CALLS_PER_REQUEST=3
      - LLM_BUDGET_TOKENS_PER_REQUEST=2500
      - LLM_RATE_LIMIT_RPS=2.0
      - INSIGHTS_RATIO_HIGH=0.5
      - INSIGHTS_RATIO_MEDIUM=0.2
      - INSIGHTS_SPIKE_RATIO=1.5
      - INSIGHTS_COOLDOWN_DAYS=7
      - INSIGHTS_IMPACT_K=1.0
      - INSIGHTS_IMPACT_CAP=2.0
      - INSIGHTS_SIZE_SMALL_MAX=200
      - INSIGHTS_SIZE_MEDIUM_MAX=1000
      - DOMAIN=agriculture
      - MAX_ACTIONS_ALLOWED=4
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-test:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    entrypoint: ["pytest"]

volumes:
  ai-db_data:
  ollama_data:
