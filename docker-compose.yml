services:
  ai-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ponti_ai
    ports:
      - "5435:5432"
    volumes:
      - ai-db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ponti_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      ai-db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgresql://postgres:postgres@ai-db:5432/ponti_ai?sslmode=disable", "up"]

  ponti-ai:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ai-db:
        condition: service_healthy
    # La configuración del servicio debe venir del ambiente (archivo .env local / vars del entorno).
    # Evitar hardcodear keys/URLs/proveedores acá.
    env_file:
      - ./.env
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-test:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    entrypoint: ["pytest"]

volumes:
  ai-db_data:
