services:
  ai-db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_copilot
    ports:
      - "55432:5432"
    volumes:
      - ai-db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ai-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      ai-db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgresql://postgres:postgres@ai-db:5432/ai_copilot?sslmode=disable", "up"]

  ai-copilot:
    build: .
    depends_on:
      ai-db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - APP_NAME=ai-copilot-service
      - APP_ENV=local
      - DB_DSN=postgresql://admin:admin@host.docker.internal:5432/new_ponti_db_dev?sslmode=disable
      - AI_SERVICE_KEYS=servicekey123
      - STATEMENT_TIMEOUT_MS=20000
      - MAX_LIMIT=200
      - DEFAULT_LIMIT=50
      - EMBEDDING_DIM=1536
      - RAG_TOP_K=5
      - LLM_PROVIDER=ollama
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.1
      - INSIGHTS_RATIO_HIGH=0.5
      - INSIGHTS_RATIO_MEDIUM=0.2
      - INSIGHTS_SPIKE_RATIO=1.5
      - INSIGHTS_COOLDOWN_DAYS=7
      - INSIGHTS_IMPACT_K=1.0
      - INSIGHTS_IMPACT_CAP=2.0
      - INSIGHTS_SIZE_SMALL_MAX=200
      - INSIGHTS_SIZE_MEDIUM_MAX=1000
      - INSIGHTS_PROJECT_BASELINE_DAYS=365
      - INSIGHTS_MIN_SAMPLES_PROJECT=10
      - INSIGHTS_BASELINE_LOCK_KEY=41001
      - INSIGHTS_RECOMPUTE_LOCK_KEY=41002
      - INSIGHTS_BASELINE_BATCH_SIZE=200
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ai-test:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    entrypoint: ["pytest"]

volumes:
  ai-db_data:
  ollama_data:
