name: Deploy AI STAGING (Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: main)"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-ai-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_STAGING }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME_STAGING }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_STAGING }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_STAGING }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_STAGING }}
      APP_NAME: ${{ vars.APP_NAME }}
      APP_ENV: staging
      STATEMENT_TIMEOUT_MS: ${{ vars.STATEMENT_TIMEOUT_MS }}
      MAX_LIMIT: ${{ vars.MAX_LIMIT }}
      DEFAULT_LIMIT: ${{ vars.DEFAULT_LIMIT }}
      COPILOT_ENABLED: ${{ vars.COPILOT_ENABLED }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS }}
      LLM_MAX_RETRIES: ${{ vars.LLM_MAX_RETRIES }}
      LLM_MAX_OUTPUT_TOKENS: ${{ vars.LLM_MAX_OUTPUT_TOKENS }}
      LLM_MAX_CALLS_PER_REQUEST: ${{ vars.LLM_MAX_CALLS_PER_REQUEST }}
      LLM_BUDGET_TOKENS_PER_REQUEST: ${{ vars.LLM_BUDGET_TOKENS_PER_REQUEST }}
      LLM_RATE_LIMIT_RPS: ${{ vars.LLM_RATE_LIMIT_RPS }}
      INSIGHTS_RATIO_HIGH: ${{ vars.INSIGHTS_RATIO_HIGH }}
      INSIGHTS_RATIO_MEDIUM: ${{ vars.INSIGHTS_RATIO_MEDIUM }}
      INSIGHTS_SPIKE_RATIO: ${{ vars.INSIGHTS_SPIKE_RATIO }}
      INSIGHTS_COOLDOWN_DAYS: ${{ vars.INSIGHTS_COOLDOWN_DAYS }}
      INSIGHTS_IMPACT_K: ${{ vars.INSIGHTS_IMPACT_K }}
      INSIGHTS_IMPACT_CAP: ${{ vars.INSIGHTS_IMPACT_CAP }}
      INSIGHTS_SIZE_SMALL_MAX: ${{ vars.INSIGHTS_SIZE_SMALL_MAX }}
      INSIGHTS_SIZE_MEDIUM_MAX: ${{ vars.INSIGHTS_SIZE_MEDIUM_MAX }}
      DOMAIN: ${{ vars.DOMAIN }}
      MAX_ACTIONS_ALLOWED: ${{ vars.MAX_ACTIONS_ALLOWED }}
      PORT: ${{ vars.PORT }}
      CLOUDSQL_INSTANCE: new-ponti-dev:us-central1:new-ponti-db-dev
      # Requisito solicitado: usar la instancia de DEV para la base de datos.
      SECRET_DB_DSN_NAME: ai-db-dsn-staging
      SECRET_AI_SERVICE_KEYS_NAME: ai-service-keys-staging
      SECRET_LLM_API_KEY_NAME: ${{ vars.SECRET_LLM_API_KEY_NAME_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (STAGING)
        run: |
          ENV_VARS="APP_NAME=${APP_NAME},APP_ENV=${APP_ENV},STATEMENT_TIMEOUT_MS=${STATEMENT_TIMEOUT_MS},MAX_LIMIT=${MAX_LIMIT},DEFAULT_LIMIT=${DEFAULT_LIMIT},COPILOT_ENABLED=${COPILOT_ENABLED},LLM_PROVIDER=${LLM_PROVIDER},LLM_MODEL=${LLM_MODEL},LLM_BASE_URL=${LLM_BASE_URL},LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS},LLM_MAX_RETRIES=${LLM_MAX_RETRIES},LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS},LLM_MAX_CALLS_PER_REQUEST=${LLM_MAX_CALLS_PER_REQUEST},LLM_BUDGET_TOKENS_PER_REQUEST=${LLM_BUDGET_TOKENS_PER_REQUEST},LLM_RATE_LIMIT_RPS=${LLM_RATE_LIMIT_RPS},INSIGHTS_RATIO_HIGH=${INSIGHTS_RATIO_HIGH},INSIGHTS_RATIO_MEDIUM=${INSIGHTS_RATIO_MEDIUM},INSIGHTS_SPIKE_RATIO=${INSIGHTS_SPIKE_RATIO},INSIGHTS_COOLDOWN_DAYS=${INSIGHTS_COOLDOWN_DAYS},INSIGHTS_IMPACT_K=${INSIGHTS_IMPACT_K},INSIGHTS_IMPACT_CAP=${INSIGHTS_IMPACT_CAP},INSIGHTS_SIZE_SMALL_MAX=${INSIGHTS_SIZE_SMALL_MAX},INSIGHTS_SIZE_MEDIUM_MAX=${INSIGHTS_SIZE_MEDIUM_MAX},DOMAIN=${DOMAIN},MAX_ACTIONS_ALLOWED=${MAX_ACTIONS_ALLOWED}"
          SECRET_FLAGS="DB_DSN=${SECRET_DB_DSN_NAME}:latest,AI_SERVICE_KEYS=${SECRET_AI_SERVICE_KEYS_NAME}:latest"
          if [[ -n "${SECRET_LLM_API_KEY_NAME}" ]]; then
            SECRET_FLAGS="${SECRET_FLAGS},LLM_API_KEY=${SECRET_LLM_API_KEY_NAME}:latest"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="${SECRET_FLAGS}" \
            --allow-unauthenticated \
            --port="${PORT:-8090}"
