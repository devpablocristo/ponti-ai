name: CI PR (AI)

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ponti-ai-ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest

      - name: Build Docker image
        run: docker build -t ponti-ai-ci-check .
