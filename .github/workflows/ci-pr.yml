name: CI PR (AI)

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout core
        uses: actions/checkout@v5
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ./core/http/python
          python -m pip install ./core/ai/python

      - name: Run tests
        env:
          PYTHONPATH: .:core/ai/python/src
        run: |
          python -m pytest

      - name: Build Docker image
        run: docker build -t ponti-ai-ci-check .
