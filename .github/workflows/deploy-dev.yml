name: Deploy AI DEV (Cloud Run)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: develop)"
        required: false
        default: "develop"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-ai-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      ARTIFACT_REGISTRY: ponti-ai-registry
      IMAGE_NAME: ponti-ai
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_AI_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      APP_NAME: ponti-ai
      APP_ENV: dev
      STATEMENT_TIMEOUT_MS: "20000"
      MAX_LIMIT: "200"
      DEFAULT_LIMIT: "50"
      COPILOT_ENABLED: "true"
      LLM_PROVIDER: "stub"
      LLM_MODEL: "stub"
      LLM_BASE_URL: "http://localhost:11434"
      LLM_TIMEOUT_MS: "5000"
      LLM_MAX_RETRIES: "3"
      LLM_MAX_OUTPUT_TOKENS: "700"
      LLM_MAX_CALLS_PER_REQUEST: "3"
      LLM_BUDGET_TOKENS_PER_REQUEST: "2500"
      LLM_RATE_LIMIT_RPS: "2.0"
      INSIGHTS_RATIO_HIGH: "0.5"
      INSIGHTS_RATIO_MEDIUM: "0.2"
      INSIGHTS_SPIKE_RATIO: "1.5"
      INSIGHTS_COOLDOWN_DAYS: "7"
      INSIGHTS_IMPACT_K: "1.0"
      INSIGHTS_IMPACT_CAP: "2.0"
      INSIGHTS_SIZE_SMALL_MAX: "200"
      INSIGHTS_SIZE_MEDIUM_MAX: "1000"
      DOMAIN: "agriculture"
      MAX_ACTIONS_ALLOWED: "4"
      PORT: "8090"
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      SECRET_DB_DSN_NAME: ai-db-dsn-dev
      SECRET_AI_SERVICE_KEYS_NAME: ai-service-keys-dev
      SECRET_LLM_API_KEY_NAME: ""
      SMOKE_STRICT_INSIGHTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (DEV)
        run: |
          ENV_VARS="APP_NAME=${APP_NAME},APP_ENV=${APP_ENV},STATEMENT_TIMEOUT_MS=${STATEMENT_TIMEOUT_MS},MAX_LIMIT=${MAX_LIMIT},DEFAULT_LIMIT=${DEFAULT_LIMIT},COPILOT_ENABLED=${COPILOT_ENABLED},LLM_PROVIDER=${LLM_PROVIDER},LLM_MODEL=${LLM_MODEL},LLM_BASE_URL=${LLM_BASE_URL},LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS},LLM_MAX_RETRIES=${LLM_MAX_RETRIES},LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS},LLM_MAX_CALLS_PER_REQUEST=${LLM_MAX_CALLS_PER_REQUEST},LLM_BUDGET_TOKENS_PER_REQUEST=${LLM_BUDGET_TOKENS_PER_REQUEST},LLM_RATE_LIMIT_RPS=${LLM_RATE_LIMIT_RPS},INSIGHTS_RATIO_HIGH=${INSIGHTS_RATIO_HIGH},INSIGHTS_RATIO_MEDIUM=${INSIGHTS_RATIO_MEDIUM},INSIGHTS_SPIKE_RATIO=${INSIGHTS_SPIKE_RATIO},INSIGHTS_COOLDOWN_DAYS=${INSIGHTS_COOLDOWN_DAYS},INSIGHTS_IMPACT_K=${INSIGHTS_IMPACT_K},INSIGHTS_IMPACT_CAP=${INSIGHTS_IMPACT_CAP},INSIGHTS_SIZE_SMALL_MAX=${INSIGHTS_SIZE_SMALL_MAX},INSIGHTS_SIZE_MEDIUM_MAX=${INSIGHTS_SIZE_MEDIUM_MAX},DOMAIN=${DOMAIN},MAX_ACTIONS_ALLOWED=${MAX_ACTIONS_ALLOWED}"
          SECRET_FLAGS="DB_DSN=${SECRET_DB_DSN_NAME}:latest,AI_SERVICE_KEYS=${SECRET_AI_SERVICE_KEYS_NAME}:latest"
          if [[ -n "${SECRET_LLM_API_KEY_NAME}" ]]; then
            SECRET_FLAGS="${SECRET_FLAGS},LLM_API_KEY=${SECRET_LLM_API_KEY_NAME}:latest"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="${SECRET_FLAGS}" \
            --allow-unauthenticated \
            --port="${PORT:-8090}"

      - name: Resolve service URL (DEV)
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio AI DEV."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: "Guardrail: traffic/latest + detagged service URLs (DEV)"
        run: |
          service_json="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os, sys
          svc = json.loads(os.environ["SERVICE_JSON"])
          traffic = svc.get("status", {}).get("traffic", [])
          ok_latest = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not ok_latest:
              print("ERROR: guardrail falló: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          envs = svc.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          bad = []
          watched = {"BASE_MANAGER_API", "AI_SERVICE_URL"}
          for e in envs:
              name = e.get("name", "")
              value = e.get("value", "")
              if not value:
                  continue
              if name in watched or name.endswith("_URL"):
                  if "---" in value:
                      bad.append(f"{name}={value}")
          if bad:
              print("ERROR: guardrail falló: URLs internas taggeadas detectadas:")
              for item in bad:
                  print(f" - {item}")
              sys.exit(1)
          print("Guardrail OK: latestRevision=100% y sin URLs taggeadas.")
          PY

      - name: Read AI service key secret (DEV)
        run: |
          raw_keys="$(gcloud secrets versions access latest \
            --project="$GCP_PROJECT_ID" \
            --secret="$SECRET_AI_SERVICE_KEYS_NAME")"
          if [[ -z "$raw_keys" ]]; then
            echo "ERROR: AI_SERVICE_KEYS vacío en DEV."
            exit 1
          fi
          smoke_key="$(printf "%s" "$raw_keys" | awk -F',' '{gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1}')"
          if [[ -z "$smoke_key" ]]; then
            echo "ERROR: no se pudo resolver una service key válida para smoke DEV."
            exit 1
          fi
          echo "::add-mask::$smoke_key"
          echo "SMOKE_SERVICE_KEY=$smoke_key" >> "$GITHUB_ENV"

      - name: Smoke release checks (DEV)
        run: |
          python3 scripts/smoke_endpoints.py
        env:
          SMOKE_BASE_URL: ${{ env.SERVICE_URL }}
          SMOKE_SERVICE_KEY: ${{ env.SMOKE_SERVICE_KEY }}
          SMOKE_STRICT_INSIGHTS: ${{ env.SMOKE_STRICT_INSIGHTS }}
